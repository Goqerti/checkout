<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Successful</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Segoe UI,Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.background{
    position:absolute;
    inset:0;
    overflow:hidden;
}

.circle{
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    opacity:.3;
    animation:float 8s ease-in-out infinite;
}

.c1{
    width:350px;
    height:350px;
    background:#16a34a;
    left:-120px;
    top:-100px;
}

.c2{
    width:300px;
    height:300px;
    background:#3b82f6;
    right:-80px;
    bottom:-100px;
    animation-delay:2s;
}

@keyframes float{
    50%{
        transform:translateY(-40px) scale(1.08);
    }
}

.card{
    position:relative;
    z-index:2;
    width:430px;
    max-width:92%;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:28px;
    text-align:center;
    padding:45px;
    color:#fff;
    box-shadow:0 30px 70px rgba(0,0,0,.35);
    animation:show .8s ease;
}

@keyframes show{
    from{
        transform:translateY(40px);
        opacity:0;
    }
    to{
        transform:translateY(0);
        opacity:1;
    }
}

.icon{
    width:110px;
    height:110px;
    margin:auto;
    border-radius:50%;
    background:#16a34a;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 0 40px rgba(34,197,94,.45);
    animation:pulse 2s infinite;
}

@keyframes pulse{
    50%{
        transform:scale(1.08);
        box-shadow:0 0 60px rgba(34,197,94,.65);
    }
}

.check{
    width:38px;
    height:70px;
    border-right:8px solid #fff;
    border-bottom:8px solid #fff;
    transform:rotate(45deg);
    margin-top:-8px;
}

h1{
    margin-top:28px;
    font-size:34px;
    font-weight:700;
}

p{
    margin-top:15px;
    color:#dbeafe;
    line-height:1.7;
    font-size:16px;
}

.info{
    margin-top:30px;
    background:rgba(255,255,255,.07);
    border-radius:18px;
    padding:18px;
}

.row{
    display:flex;
    justify-content:space-between;
    margin:10px 0;
    color:#dbeafe;
}

.row strong{
    color:#fff;
}

button{
    width:100%;
    margin-top:28px;
    border:none;
    border-radius:14px;
    padding:16px;
    font-size:17px;
    cursor:pointer;
    font-weight:600;
    background:#22c55e;
    color:#fff;
    transition:.25s;
}

button:hover{
    background:#16a34a;
    transform:translateY(-2px);
}

.footer{
    margin-top:22px;
    color:#b6c2d3;
    font-size:13px;
}

.confetti{
    position:absolute;
    width:10px;
    height:10px;
    top:-20px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="background">
<div class="circle c1"></div>
<div class="circle c2"></div>
</div>

<div class="card">

<div class="icon">
<div class="check"></div>
</div>

<h1>Payment Successful</h1>

<p>
Your payment has been processed successfully.
Thank you for your purchase. A confirmation email has been sent to your registered email address.
</p>

<div class="info">

<div class="row">
<span>Status</span>
<strong>Completed</strong>
</div>

<div class="row">
<span>Reference</span>
<strong>#PAY-2026-784951</strong>
</div>

<div class="row">
<span>Date</span>
<strong id="date"></strong>
</div>

</div>

<button onclick="window.location.href='/'">
Continue
</button>

<div class="footer">
Secure payment powered by SSL Encryption
</div>

</div>

<script>
document.getElementById("date").innerHTML=
new Date().toLocaleString("en-US",{
dateStyle:"medium",
timeStyle:"short"
});

const colors=[
"#22c55e",
"#3b82f6",
"#facc15",
"#ef4444",
"#a855f7",
"#06b6d4"
];

function confetti(){

for(let i=0;i<180;i++){

const c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background=colors[Math.floor(Math.random()*colors.length)];

c.style.animationDuration=(Math.random()*3+2)+"s";

c.style.transform="rotate("+Math.random()*360+"deg)";

c.style.opacity=Math.random();

document.body.appendChild(c);

setTimeout(()=>{
c.remove();
},6000);

}

}

window.onload=confetti;
</script>

</body>
</html>
